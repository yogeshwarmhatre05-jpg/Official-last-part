<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vienna Gambit Chess Viewer</title>

<style>
*{
box-sizing:border-box;
}

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#0b1220;
font-family:Arial;
gap:20px;
}

.board{
width:360px;
height:360px;
display:grid;
grid-template-columns:repeat(8,45px);
grid-template-rows:repeat(8,45px);
border-radius:12px;
overflow:hidden;
box-shadow:0 0 25px rgba(0,0,0,0.6);
}

.square{
width:45px;
height:45px;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

.white{
background:#eeeed2;
}

.black{
background:#769656;
}

.square img{
width:85%;
height:85%;
}

.controls{
display:flex;
gap:12px;
}

button{
padding:10px 18px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

#moveText{
width:360px;
background:#111827;
color:white;
padding:12px;
border-radius:10px;
font-size:14px;
line-height:1.6;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<div id="board" class="board"></div>

<div class="controls">
<button onclick="prevMove()">◀ Previous</button>
<button onclick="nextMove()">Next ▶</button>
</div>

<div id="moveText"></div>

<script>

const boardEl = document.getElementById("board");
const moveText = document.getElementById("moveText");

/* ================= START POSITION ================= */

const startPosition = [
"r","n","b","q","k","b","n","r",
"p","p","p","p","p","p","p","p",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"P","P","P","P","P","P","P","P",
"R","N","B","Q","K","B","N","R"
];

let position = [...startPosition];

/* ================= PIECE IMAGES ================= */

function mapPiece(p){
return {
r:"br",
n:"bn",
b:"bb",
q:"bq",
k:"bk",
p:"bp",
R:"wr",
N:"wn",
B:"wb",
Q:"wq",
K:"wk",
P:"wp"
}[p];
}

function pieceImg(p){
return `https://images.chesscomfiles.com/chess-themes/pieces/neo/150/${mapPiece(p)}.png`;
}

/* ================= DRAW BOARD ================= */

function draw(){

boardEl.innerHTML = "";

position.forEach((p,i)=>{

const sq = document.createElement("div");

const r = Math.floor(i/8);
const c = i%8;

sq.className = "square " + ((r+c)%2 ? "black":"white");

if(p){

const img = document.createElement("img");
img.src = pieceImg(p);

sq.appendChild(img);
}

boardEl.appendChild(sq);

});

}

/* ================= MOVE HELPERS ================= */

function idx(file,rank){

const files = "abcdefgh";

const c = files.indexOf(file);
const r = 8-rank;

return r*8+c;
}

function move(from,to){

position[to]=position[from];
position[from]="";

}

/* ================= VIENNA GAMBIT MAIN LINE ================= */

const moves = [

{
text:"1. e4",
play(){
move(idx("e",2),idx("e",4));
}
},

{
text:"... e5",
play(){
move(idx("e",7),idx("e",5));
}
},

{
text:"2. Nc3",
play(){
move(idx("b",1),idx("c",3));
}
},

{
text:"... Nf6",
play(){
move(idx("g",8),idx("f",6));
}
},

{
text:"3. f4",
play(){
move(idx("f",2),idx("f",4));
}
},

{
text:"... d5",
play(){
move(idx("d",7),idx("d",5));
}
},

{
text:"4. fxe5",
play(){
move(idx("f",4),idx("e",5));
}
},

{
text:"... Nxe4",
play(){
move(idx("f",6),idx("e",4));
}
},

{
text:"5. Nf3",
play(){
move(idx("g",1),idx("f",3));
}
},

{
text:"... Be7",
play(){
move(idx("f",8),idx("e",7));
}
},

{
text:"6. d3",
play(){
move(idx("d",2),idx("d",3));
}
},

{
text:"... Nxc3",
play(){
move(idx("e",4),idx("c",3));
}
},

{
text:"7. bxc3",
play(){
move(idx("b",2),idx("c",3));
}
},

{
text:"... O-O",
play(){

position[idx("g",8)]="k";
position[idx("f",8)]="r";

position[idx("e",8)]="";
position[idx("h",8)]="";

}
},

{
text:"8. d4",
play(){
move(idx("d",3),idx("d",4));
}
},

{
text:"... c5",
play(){
move(idx("c",7),idx("c",5));
}
},

{
text:"9. Bd3",
play(){
move(idx("f",1),idx("d",3));
}
},

{
text:"... Nc6",
play(){
move(idx("b",8),idx("c",6));
}
},

{
text:"10. O-O",
play(){

position[idx("g",1)]="K";
position[idx("f",1)]="R";

position[idx("e",1)]="";
position[idx("h",1)]="";

}
},

{
text:"... Bg4",
play(){
move(idx("c",8),idx("g",4));
}
},

{
text:"11. Be3",
play(){
move(idx("d",2),idx("e",3));
}
},

{
text:"... Qa5",
play(){
move(idx("d",8),idx("a",5));
}
},

{
text:"12. Qe1",
play(){
move(idx("d",1),idx("e",1));
}
},

{
text:"... c4",
play(){
move(idx("c",5),idx("c",4));
}
},

{
text:"13. Bxh7+",
play(){
move(idx("d",3),idx("h",7));
}
},

{
text:"... Kxh7",
play(){
move(idx("g",8),idx("h",7));
}
},

{
text:"14. Ng5+",
play(){
move(idx("f",3),idx("g",5));
}
},

{
text:"... Bxg5",
play(){
move(idx("g",4),idx("g",5));
}
},

{
text:"15. Bxg5",
play(){
move(idx("e",3),idx("g",5));
}
}

];

let currentMove = 0;

/* ================= UPDATE TEXT ================= */

function updateText(){

let txt = "";

for(let i=0;i<currentMove;i++){

txt += moves[i].text + " ";

}

moveText.innerText = txt;

}

/* ================= NEXT ================= */

function nextMove(){

if(currentMove >= moves.length) return;

moves[currentMove].play();

currentMove++;

draw();

updateText();

}

/* ================= PREVIOUS ================= */

function prevMove(){

if(currentMove<=0) return;

position = [...startPosition];

currentMove--;

for(let i=0;i<currentMove;i++){

moves[i].play();

}

draw();

updateText();

}

/* ================= START ================= */

draw();
updateText();

</script>

</body>
</html>
