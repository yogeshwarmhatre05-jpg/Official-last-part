<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Partners Section</title>

<style>
body {
  background: #1A0F0F;
  font-family: sans-serif;
  margin: 0;
  padding: 20px;
  color: #FFE4E6;
}

/* Section Box */
.section {
  border: 2px solid #3B0A0A;
  border-radius: 12px;
  padding: 15px;
  background: #140909;
}

/* Title */
.section-title {
  background: linear-gradient(145deg, #3B0A0A, #1A0F0F);
  border-radius: 30px;
  padding: 10px;
  text-align: center;
  margin-bottom: 15px;
  color: #EF4444;
  font-weight: bold;
  letter-spacing: 1px;
}

/* Partner Card */
.partner-card {
  background: #1A0F0F;
  border: 1px solid #3B0A0A;
  border-radius: 14px;
  padding: 15px;
  text-align: center;
  margin-bottom: 12px;
  transition: 0.2s;
}

.partner-card:hover {
  transform: scale(1.03);
}

/* Image */
.partner-img {
  width: 70px;
  height: 70px;
  border-radius: 12px;
  object-fit: cover;
  margin-bottom: 8px;
}

/* Name */
.partner-name {
  font-size: 14px;
  color: #FFE4E6;
}
</style>
</head>

<body>

<div class="section">
  <div class="section-title">◆ PARTNERS ◆</div>

  <div id="partnersContainer"></div>
</div>

<script>
// 🔹 Add your partners here
const partners = [
  {
    name: "No one 1",
    img: "",
    link: ""
  },
  {
    name: "No one 2",
    img: "",
    link: ""
  }
];

// 🔹 Render partners
const container = document.getElementById("partnersContainer");

partners.forEach(p => {
  const card = document.createElement("div");
  card.className = "partner-card";

  card.innerHTML = `
    <img src="${p.img}" class="partner-img">
    <div class="partner-name">${p.name}</div>
  `;

  // Click to open link
  card.onclick = () => {
    window.open(p.link, "_blank");
  };

  container.appendChild(card);
});
</script>

</body>
</html>
