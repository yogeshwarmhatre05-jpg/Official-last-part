<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>vienna gambit</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0b1220;
font-family:Arial;
overflow:hidden;
}

.board{
width:360px;
height:360px;
display:grid;
grid-template-columns:repeat(8,45px);
grid-template-rows:repeat(8,45px);
border-radius:12px;
overflow:hidden;
box-shadow:0 0 25px rgba(0,0,0,0.7);
}

.square{
width:45px;
height:45px;
display:flex;
justify-content:center;
align-items:center;
}

.white{
background:#eeeed2;
}

.black{
background:#769656;
}

.square img{
width:85%;
height:85%;
pointer-events:none;
}

</style>
</head>

<body>

<div class="board" id="board"></div>

<script>

const board=document.getElementById("board");

/* ================= PIECE IMAGE ================= */

function pieceImg(type){

return `https://images.chesscomfiles.com/chess-themes/pieces/neo/150/${type}.png`;

}

/* ================= START POSITION ================= */

let pieces;

function createPieces(){

return {

/* BLACK */

BR1:{type:"br",square:"a8"},
BN1:{type:"bn",square:"b8"},
BB1:{type:"bb",square:"c8"},
BQ1:{type:"bq",square:"d8"},
BK1:{type:"bk",square:"e8"},
BB2:{type:"bb",square:"f8"},
BN2:{type:"bn",square:"g8"},
BR2:{type:"br",square:"h8"},

BP1:{type:"bp",square:"a7"},
BP2:{type:"bp",square:"b7"},
BP3:{type:"bp",square:"c7"},
BP4:{type:"bp",square:"d7"},
BP5:{type:"bp",square:"e7"},
BP6:{type:"bp",square:"f7"},
BP7:{type:"bp",square:"g7"},
BP8:{type:"bp",square:"h7"},

/* WHITE */

WR1:{type:"wr",square:"a1"},
WN1:{type:"wn",square:"b1"},
WB1:{type:"wb",square:"c1"},
WQ1:{type:"wq",square:"d1"},
WK1:{type:"wk",square:"e1"},
WB2:{type:"wb",square:"f1"},
WN2:{type:"wn",square:"g1"},
WR2:{type:"wr",square:"h1"},

WP1:{type:"wp",square:"a2"},
WP2:{type:"wp",square:"b2"},
WP3:{type:"wp",square:"c2"},
WP4:{type:"wp",square:"d2"},
WP5:{type:"wp",square:"e2"},
WP6:{type:"wp",square:"f2"},
WP7:{type:"wp",square:"g2"},
WP8:{type:"wp",square:"h2"}

};

}

pieces=createPieces();

/* ================= DRAW BOARD ================= */

const files="abcdefgh";

function draw(){

board.innerHTML="";

for(let r=8;r>=1;r--){

for(let c=0;c<8;c++){

const sq=document.createElement("div");

sq.className="square "+(((r+c)%2)?"white":"black");

const coord=files[c]+r;

for(let id in pieces){

if(pieces[id].square===coord){

const img=document.createElement("img");

img.src=pieceImg(pieces[id].type);

sq.appendChild(img);

}

}

board.appendChild(sq);

}

}

}

/* ================= MOVE ================= */

function move(piece,to){

for(let id in pieces){

if(id!==piece && pieces[id].square===to){

delete pieces[id];

}

}

pieces[piece].square=to;

}

/* ================= CASTLING ================= */

function castleBlack(){

pieces["BK1"].square="g8";
pieces["BR2"].square="f8";

}

function castleWhite(){

pieces["WK1"].square="g1";
pieces["WR2"].square="f1";

}

/* ================= VIENNA GAMBIT ================= */

const moves=[

["WP5","e4"],
["BP5","e5"],

["WN1","c3"],
["BN2","f6"],

["WP6","f4"],
["BP4","d5"],

["WP6","e5"],
["BN2","e4"],

["WN2","f3"],
["BB2","e7"],

["WP4","d3"],
["BN2","c3"],

["WP2","c3"],

["castleBlack",""],

["WP4","d4"],
["BP3","c5"],

["WB2","d3"],
["BN1","c6"],

["castleWhite",""],

["BB1","g4"],

["WB1","e3"],
["BQ1","a5"],

["WQ1","e1"],
["BP3","c4"],

["WB2","h7"],
["BK1","h7"],

["WN2","g5"]

];

let current=0;

/* ================= AUTO PLAY ================= */

function playNext(){

if(current>=moves.length){

setTimeout(resetBoard,2000);

return;

}

const [piece,to]=moves[current];

if(piece==="castleBlack"){

castleBlack();

}
else if(piece==="castleWhite"){

castleWhite();

}
else{

move(piece,to);

}

draw();

current++;

setTimeout(playNext,1200);

}

/* ================= RESET ================= */

function resetBoard(){

pieces=createPieces();

current=0;

draw();

setTimeout(playNext,1200);

}

/* ================= START ================= */

draw();

playNext();

</script>

</body>
</html>
